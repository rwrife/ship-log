name: Release

# Publish ship-log to (Test)PyPI via PEP 740 OIDC "trusted publishing" — no API
# tokens stored in the repo. Trigger by pushing a tag:
#
#   v0.1.0rc1   -> builds, then publishes to TestPyPI   (pre-release: a/b/rc/dev)
#   v0.1.0      -> builds, then publishes to PyPI        (final release)
#
# One-time setup (repo owner): create the project's trusted publisher on
#   - https://test.pypi.org/manage/account/publishing/  (env: testpypi)
#   - https://pypi.org/manage/account/publishing/        (env: pypi)
# pointing at this repo + workflow `release.yml` + the matching environment.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject version $pkg"
            exit 1
          fi

      - name: Classify release channel
        id: classify
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if printf '%s' "$tag" | grep -Eq '(a|b|rc|\.dev)[0-9]*$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
